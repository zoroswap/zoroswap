[workspace]
resolver = "2"
members = ["crates/zoro_curve_base", "crates/zoro_miden", "crates/zoroswap"]

[workspace.dependencies]
alloy = { version = "1.0.23", features = ["full"] }
miden-assembly = "0.20"
miden-client = { version = "0.13.4", features = ["testing", "tonic"] }
miden-client-sqlite-store = { version = "0.13.4" }
miden-core = "0.20"
miden-protocol = { version = "0.13", default-features = false, features = [
  "testing",
] }
miden-standards = { version = "0.13", default-features = false }
miden-tx = "0.13"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
